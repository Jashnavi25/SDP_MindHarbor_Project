{% extends 'base.html' %}
{% block content %}
<div class="container d-flex justify-content-center mt-4">
  <div class="card shadow" style="max-width: 600px; width: 100%;">
    <div class="card-header bg-light">
      <h4 class="text-primary mb-0">Add Counseling Session</h4>
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}

        <!-- Student Dropdown -->
        <div class="mb-3">
          <label for="id_student" class="form-label">Student:</label>
          {{ form.student }}
        </div>

        <!-- Counselor Dropdown -->
        <div class="mb-3">
          <label for="id_counselor" class="form-label">Counselor:</label>
          {{ form.counselor }}
        </div>

        <!-- Scheduled Time Inline -->
        <div class="mb-3 d-flex align-items-center">
          <label for="id_scheduled_time" class="form-label me-2">Scheduled Time:</label>
          {{ form.scheduled_time }}
        </div>

        <!-- Notes -->
        <div class="mb-3">
          <label for="id_notes" class="form-label">Notes:</label>
          {{ form.notes }}
        </div>

        <button type="submit" class="btn btn-success w-100">Save</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
