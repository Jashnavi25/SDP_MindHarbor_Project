{% extends 'base.html' %}
{% block content %}
<div class="container">
  <h2 class="text-primary mb-4">Wellness Resources</h2>
  <ul class="list-group">
    {% for resource in resources %}
      <li class="list-group-item">
        <strong>{{ resource.title }}</strong><br>
        {{ resource.description }}<br>
        <a href="{{ resource.link }}" target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-sm">View Resource</a>
      </li>
    {% empty %}
      <li class="list-group-item text-center">No resources available</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
