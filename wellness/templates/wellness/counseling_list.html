{% extends 'base.html' %}
{% block content %}
<div class="container">
  <h2 class="text-primary mb-4">Counseling Sessions</h2>
  <table class="table table-striped">
    <thead><tr><th>Student</th><th>Counselor</th><th>Time</th><th>Notes</th></tr></thead>
    <tbody>
      {% for session in sessions %}
        <tr>
          <td>{{ session.student }}</td>
          <td>{{ session.counselor }}</td>
          <td>{{ session.scheduled_time }}</td>
          <td>{{ session.notes }}</td>
        </tr>
      {% empty %}
        <tr><td colspan="4" class="text-center">No sessions scheduled</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
