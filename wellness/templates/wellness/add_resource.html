{% extends 'base.html' %}
{% block content %}
<div class="container">
  <div class="card shadow mb-4" style="max-width: 600px; margin: auto;">
    <div class="card-header bg-light">
      <h5 class="text-primary mb-0">Add Wellness Resource</h5>
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success w-100">Save</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
