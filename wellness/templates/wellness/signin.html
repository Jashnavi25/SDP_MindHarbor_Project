{% extends 'base.html' %}
{% block content %}
<div class="card shadow p-4" style="width: 400px;">
  <h2 class="text-center mb-4">Sign In</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary w-100">Login</button>
  </form>
  <p class="mt-3 text-center">
    New user? <a href="/signup/">Sign Up</a>
  </p>
</div>
{% endblock %}
